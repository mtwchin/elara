name: Elara CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest ruff

    - name: Lint with Ruff
      run: |
        cd backend
        ruff check .

    - name: Run Tests
      env:
        RE_PORTFOLIO_JWT_SECRET: "test_secret"
        DATABASE_URL: "sqlite:///:memory:"
      run: |
        cd backend
        pytest tests/

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Compose
      run: docker compose build
