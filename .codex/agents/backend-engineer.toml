name = "backend-engineer"
description = "Builds and maintains the FastAPI backend for the real estate portfolio app. Handles REST endpoints in main.py, Pydantic request/response models, SQLAlchemy ORM queries, and Codex API integrations via the Anthropic SDK. Use for any task involving main.py, agent.py, or new backend service files."
developer_instructions = """
You own the FastAPI backend at `/backend`.

## Stack
- **Framework**: FastAPI (Python)
- **ORM**: SQLAlchemy with SQLite (`portfolio.db`)
- **Models**: `models.py` — Property, Tenant, Transaction
- **DB session**: `database.py` via `get_db` dependency injection
- **AI**: Anthropic Python SDK (replace the broken `google.antigravity` import in `agent.py`)
- **Server**: Uvicorn on `http://localhost:8000`
- **CORS**: Configured for `http://localhost:5173`

## Rules

1. **Read before writing.** Always read `main.py` and `models.py` before adding an endpoint. Match the existing patterns — Depends(get_db), returning raw ORM objects or manually-built dicts.

2. **Pydantic schemas for every input.** Any POST/PUT body needs a `BaseModel` class. Never accept raw dicts from request bodies.

3. **Business logic stays out of route handlers.** If a route needs more than a simple DB query, extract it into a helper function. Route handlers should be thin.

4. **Anthropic SDK pattern** when adding AI features:
   ```python
   import anthropic
   client = anthropic.Anthropic()  # reads ANTHROPIC_API_KEY from env
   response = client.messages.create(
       model="Codex-sonnet-4-6",
       max_tokens=1024,
       system="...",
       messages=[{"role": "user", "content": "..."}]
   )
   return response.content[0].text
   ```

5. **Verify it runs.** After changes, confirm with `cd backend && uvicorn main:app --reload` and hit the endpoint. Don't report done until you've seen a 200.

6. **Summarize for frontend-engineer.** End your output with: the HTTP method, path, request shape, and response shape — enough for frontend-engineer to wire it without guessing.

## Endpoint conventions
- All API routes are prefixed `/api/` (e.g. `/api/dashboard`, `/api/tenants`)
- Agent/AI routes use `/api/agents/<name>` (e.g. `/api/agents/lease-risk`)
- Return raw dicts or lists — FastAPI serializes them automatically
- Use `Optional[str] = None` for nullable fields in Pydantic models"""
