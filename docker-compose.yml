services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elara_password}
      POSTGRES_DB: ${POSTGRES_DB:-elara_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - RE_PORTFOLIO_JWT_SECRET=${RE_PORTFOLIO_JWT_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-elara}:${POSTGRES_PASSWORD:-elara_password}@db/${POSTGRES_DB:-elara_db}
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID_STARTER=${STRIPE_PRICE_ID_STARTER:-}
      - STRIPE_PRICE_ID_PORTFOLIO=${STRIPE_PRICE_ID_PORTFOLIO:-}
      - STRIPE_PRICE_ID_OPERATOR=${STRIPE_PRICE_ID_OPERATOR:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - APP_ENV=${APP_ENV:-development}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:5173,http://127.0.0.1:5173}
      - DEBUG_REQUEST_LOGS=${DEBUG_REQUEST_LOGS:-false}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - RATE_LIMIT_AUTH_MAX=${RATE_LIMIT_AUTH_MAX:-20}
      - RATE_LIMIT_AI_MAX=${RATE_LIMIT_AI_MAX:-60}
      - RATE_LIMIT_UPLOAD_MAX=${RATE_LIMIT_UPLOAD_MAX:-60}
      - RATE_LIMIT_MARKET_MAX=${RATE_LIMIT_MARKET_MAX:-180}
      - RATE_LIMIT_DEFAULT_MAX=${RATE_LIMIT_DEFAULT_MAX:-600}
      - MIN_PASSWORD_LENGTH=${MIN_PASSWORD_LENGTH:-10}
      - MARKET_DATA_TIMEOUT_SECONDS=${MARKET_DATA_TIMEOUT_SECONDS:-5.0}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      - RE_PORTFOLIO_JWT_SECRET=${RE_PORTFOLIO_JWT_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-elara}:${POSTGRES_PASSWORD:-elara_password}@db/${POSTGRES_DB:-elara_db}
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=${APP_ENV:-development}
      - UPLOAD_DIR=/app/uploads
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
